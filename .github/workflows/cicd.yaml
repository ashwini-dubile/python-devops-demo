name: Python DevOps Demo CI/CD

on:
  push:
    branches:
      - main

jobs:
  ci-cd:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run tests
        run: |
          pytest tests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/python-devops-demo:latest

      - name: Replace image in deployment manifest
        run: |
          sed -i 's|YOUR_DOCKERHUB_USERNAME/python-devops-demo:latest|${{ secrets.DOCKERHUB_USERNAME }}/python-devops-demo:latest|g' k8s/deployment.yaml

      - name: Deploy namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Deploy app
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/servicemonitor.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/python-devops-demo -n demo
